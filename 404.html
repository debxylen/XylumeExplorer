<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xylume Explorer</title>
    <script>
        (function () {
            const path = window.location.pathname.split('/').filter(p => p);
            if (path.length === 2) {
                const [type, id] = path;
                if (type === "tx") {
                    window.location.replace(`/tx.html?hash=${id}`);
                } else if (type === "address") {
                    window.location.replace(`/address.html?address=${id}`);
                }
            } else {
                document.body.innerHTML = '<h1>404 - Page Not Found</h1>'
            }
        })();
    </script>
</head>

</body>

</html>
